services:
  gateway-service:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: api-gateway-gateway-service
    environment:
      - USER_SERVICE_URL=http://user-service:8001
      - PRODUCT_SERVICE_URL=http://product-service:8002
      - ORDER_SERVICE_URL=http://order-service:8003
      - REQUEST_TIMEOUT=5.0
      - SERVICE_NAME=gateway-service
    command: uvicorn services.gateway_service.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - product-service
      - order-service

  user-service:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: api-gateway-user-service
    environment:
      - SERVICE_NAME=user-service
    command: uvicorn services.user_service.app:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"

  product-service:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: api-gateway-product-service
    environment:
      - SERVICE_NAME=product-service
    command: uvicorn services.product_service.app:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"

  order-service:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: api-gateway-order-service
    environment:
      - SERVICE_NAME=order-service
    command: uvicorn services.order_service.app:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
