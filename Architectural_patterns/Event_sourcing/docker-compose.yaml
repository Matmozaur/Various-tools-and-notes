services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: events
    ports:
      - "5432:5432"

  command_api:
    build: ./services/command_api
    depends_on:
      - kafka
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: account-events

  event_store:
    build: ./services/event_store
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: account-events
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/events

  projection:
    build: ./services/projection
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: account-events
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/events
